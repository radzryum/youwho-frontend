<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouWho! - Finding Peer</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            /* Uses the exact same gradient as the other pages */
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; margin: 0;
        }

        .loading-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .bubble-container {
            position: relative; width: 300px; height: 200px; margin-bottom: 3rem;
            display: flex; justify-content: center; align-items: center;
        }

        .bubble {
            width: 140px; height: 140px; border-radius: 50%; position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.1) 60%, rgba(255,255,255,0.5) 100%);
            box-shadow: inset 0 0 30px rgba(255,255,255,0.6), 0 0 20px rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .bubble.teal {
            left: 20px; background-color: rgba(72, 201, 176, 0.3);
            animation: mergeLeft 4s ease-in-out forwards;
        }

        .bubble.purple {
            right: 20px; background-color: rgba(224, 195, 252, 0.4); 
            animation: mergeRight 4s ease-in-out forwards;
        }

        @keyframes mergeLeft {
            0% { transform: translateX(0) scale(1); }
            40% { transform: translateX(30px) scale(1); }
            80% { transform: translateX(65px) scale(1.15); opacity: 1; }
            100% { transform: translateX(65px) scale(1.25); opacity: 0; }
        }

        @keyframes mergeRight {
            0% { transform: translateX(0) scale(1); }
            40% { transform: translateX(-30px) scale(1); }
            80% { transform: translateX(-65px) scale(1.15); }
            100% { transform: translateX(-65px) scale(1.25); } 
        }

        .text-container { text-align: center; height: 120px; position: relative; width: 100%; min-width: 400px; }
        
        .status-text {
            position: absolute; width: 100%;
            font-size: 1.5rem; font-weight: bold; color: #334155;
            opacity: 0.3; transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .line1 { top: 0px; animation: textFocus1 4s linear forwards; }
        .line2 { top: 40px; animation: textFocus2 4s linear forwards; }
        .line3 { top: 80px; animation: textFocus3 4s linear forwards; }

        @keyframes textFocus1 { 0%, 30% { opacity: 1; color: #1e293b; transform: scale(1.05); } 35%, 100% { opacity: 0.3; color: #64748b; transform: scale(1); } }
        @keyframes textFocus2 { 0%, 30% { opacity: 0.3; } 35%, 65% { opacity: 1; color: #1e293b; transform: scale(1.05); } 70%, 100% { opacity: 0.3; color: #64748b; transform: scale(1); } }
        @keyframes textFocus3 { 0%, 65% { opacity: 0.3; } 70%, 100% { opacity: 1; color: #1e293b; transform: scale(1.05); } }
    </style>
</head>
<body>
    <div class="loading-wrapper">
        <div class="bubble-container">
            <div class="bubble teal"></div>
            <div class="bubble purple"></div>
        </div>
        <div class="text-container">
            <div class="status-text line1">Finding a supportive listener...</div>
            <div class="status-text line2">Matching specifically for anxiety...</div>
            <div class="status-text line3">Connecting you to a safe place...</div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'index.html?startCall=true';
        }, 5000);
    </script>
</body>
</html>
